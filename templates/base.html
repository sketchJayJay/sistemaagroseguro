<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Controle Café</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <aside class="sidebar">
    <div class="brand">
      <div class="logo">☕</div>
      <div>
        <strong>Controle Café</strong>
        <span>Compra • Prova • Venda</span>
      </div>
    </div>
    <nav>
      <a href="{{ url_for('index') }}">Início</a>
      <a href="{{ url_for('pessoas') }}">Clientes/Fornecedores</a>
      <a href="{{ url_for('compras') }}">Compras</a>
      <a href="{{ url_for('provas') }}">Provas</a>
      <a href="{{ url_for('vendas') }}">Vendas</a>
      <a href="{{ url_for('financeiro') }}">Financeiro</a>
      <a href="{{ url_for('relatorios') }}">Relatórios</a>
    </nav>
  </aside>
  <main>
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="flash">{{ messages[0] }}</div>
      {% endif %}
    {% endwith %}
    {% block content %}{% endblock %}
  </main>
</body>
</html>
