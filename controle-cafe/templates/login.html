<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Entrar • Café Boa Vista</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="auth-page">
  <div class="auth-card">
    <img src="{{ url_for('static', filename='logo_boavista.jpg') }}" alt="Café Boa Vista">
    <h1>Entrar no sistema</h1>
    <p>Acesso protegido. Informe o usuário e a senha do administrador.</p>
    {% with msgs=get_flashed_messages() %}{% if msgs %}<div class="flash">{{ msgs[0] }}</div>{% endif %}{% endwith %}
    <form method="post" class="auth-form">
      <label>Usuário</label>
      <input name="usuario" autocomplete="username" required autofocus>
      <label>Senha</label>
      <input type="password" name="senha" autocomplete="current-password" required>
      <button class="btn">Entrar</button>
    </form>
  </div>
</body>
</html>
