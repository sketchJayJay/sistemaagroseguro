{% extends 'base.html' %}{% block content %}
<h1>Editar cliente</h1><p class="subtitle">Atualize os dados do cadastro.</p>
<div class="card"><form method="post" class="form">
  <div><label>Tipo</label><select name="tipo"><option {% if pessoa.tipo=='Cliente' %}selected{% endif %}>Cliente</option><option {% if pessoa.tipo=='Fornecedor' %}selected{% endif %}>Fornecedor</option><option {% if pessoa.tipo=='Cliente e Fornecedor' %}selected{% endif %}>Cliente e Fornecedor</option></select></div>
  <div><label>Nome</label><input name="nome" value="{{ pessoa.nome }}" required></div><div><label>CPF/CNPJ</label><input name="documento" value="{{ pessoa.documento or '' }}"></div><div><label>Telefone</label><input name="telefone" value="{{ pessoa.telefone or '' }}"></div><div><label>WhatsApp</label><input name="whatsapp" value="{{ pessoa.whatsapp or '' }}"></div><div><label>Cidade</label><input name="cidade" value="{{ pessoa.cidade or '' }}"></div><div><label>Endereço</label><input name="endereco" value="{{ pessoa.endereco or '' }}"></div><div><label>Fazenda/Sítio</label><input name="fazenda" value="{{ pessoa.fazenda or '' }}"></div><div class="span"><label>Observação</label><input name="observacao" value="{{ pessoa.observacao or '' }}"></div>
  <button class="btn">Salvar</button><a class="btn light" href="{{ url_for('painel_cliente', pessoa_id=pessoa.id) }}">Voltar ao painel</a>
</form></div>
{% endblock %}
